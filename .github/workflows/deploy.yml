name: CI/CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run type-check
      - name: Test
        run: npm run test

  deploy:
    name: Deploy
    needs: prepare
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd /root/web/zvuchi-vocal/
            
            echo "Starting deployment..."
            
            # Backup database before deployment
            echo "Creating database backup..."
            bash scripts/backup-db.sh
            
            # Pull latest changes
            echo "Pulling latest changes..."
            git pull origin main
            
            # Build Docker image
            echo "Building Docker image..."
            docker build -t zvuchi-vocal:latest .
            
            # Stop and remove old container
            echo "Stopping old container..."
            docker stop zvuchi-vocal || true
            docker rm zvuchi-vocal || true
            
            # Run new container with volume for database
            echo "Starting new container..."
            docker run -d \
              --name zvuchi-vocal \
              --restart unless-stopped \
              -p 3000:3000 \
              -v /root/web/zvuchi-vocal/data:/app/data \
              --env-file .env \
              zvuchi-vocal:latest
            
            # Wait for container to be healthy
            echo "Waiting for container to be healthy..."
            sleep 5
            
            if docker ps | grep -q zvuchi-vocal; then
              echo "✅ Deployment completed successfully"
            else
              echo "❌ Container failed to start"
              docker logs zvuchi-vocal
              exit 1
            fi
